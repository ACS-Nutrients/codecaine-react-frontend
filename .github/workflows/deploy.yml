name: Deploy to ECS

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 070238434919.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: cdci-prd-frontend
  ECS_CLUSTER: cdci-prd-cluster
  ECS_SERVICE: cdci-prd-frontend-service
  TASK_DEFINITION: cdci-prd-frontend
  CONTAINER_NAME: frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Debug secrets
        run: |
          echo "POOL_ID length: ${#POOL_ID}"
          echo "CLIENT_ID length: ${#CLIENT_ID}"
        env:
          POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}

      - name: Build and push image
        id: build
        run: |
          IMAGE_TAG=$(date +%s)
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker build \
          --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
          --build-arg VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }} \
          -t $IMAGE .
          docker push $IMAGE

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Render task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:${{ env.AWS_REGION }}:070238434919:task-definition/${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          force-new-deployment: true
