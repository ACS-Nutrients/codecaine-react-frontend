name: Deploy TypeScript Service to ECS

on:
  push:
    branches:
      - deploy
    paths:
      - './**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service to deploy (frontend)'
        required: true
        type: choice
        options:
          - frontend

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 365827924759.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  deploy:
    name: Build and Deploy TypeScript Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine service name
        id: service 
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service_name }}"
          else
            # Auto-detect from changed files
            SERVICE="frontend"  # Default
          fi
          echo "name=$SERVICE" >> $GITHUB_OUTPUT
          echo "ecr_repo=codecaine-$SERVICE" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REPOSITORY: ${{ steps.service.outputs.ecr_repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 타임스탬프 생성 (UTC)
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$TIMESTAMP \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f Dockerfile \
            services/typescript/${{ steps.service.outputs.name }}
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TIMESTAMP
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Check if task definition exists
        id: check-task-def
        run: |
          if aws ecs describe-task-definition \
            --task-definition cdci-prd-${{ steps.service.outputs.name }} \
            --query taskDefinition > task-definition.json 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Task definition exists, will update and deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Task definition does not exist yet"
            echo "📋 Infrastructure must be deployed first using Terraform"
            echo "   Run: cd terraform/environments/prd && terraform apply"
          fi

      - name: Fill in the new image ID in the Amazon ECS task definition
        if: steps.check-task-def.outputs.exists == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ steps.service.outputs.name }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        if: steps.check-task-def.outputs.exists == 'true'
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: cdci-prd-${{ steps.service.outputs.name }}-service
          cluster: cdci-prd-cluster
          wait-for-service-stability: true

      - name: Verify deployment
        if: steps.check-task-def.outputs.exists == 'true'
        run: |
          echo "🚀 Deployment completed!"
          echo "Service: ${{ steps.service.outputs.name }}"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Timestamp: ${{ steps.build-image.outputs.timestamp }}"
          
          # Get service status
          aws ecs describe-services \
            --cluster cdci-prd-cluster \
            --services cdci-prd-${{ steps.service.outputs.name }}-service \
            --query 'services[0].[serviceName,status,runningCount,desiredCount]' \
            --output table
          
          # Get task status
          TASK_ARN=$(aws ecs list-tasks \
            --cluster cdci-prd-cluster \
            --service-name cdci-prd-${{ steps.service.outputs.name }}-service \
            --desired-status RUNNING \
            --query 'taskArns[0]' \
            --output text)
          
          if [ "$TASK_ARN" != "None" ]; then
            echo "✅ Task is running: $TASK_ARN"
            aws ecs describe-tasks \
              --cluster cdci-prd-cluster \
              --tasks $TASK_ARN \
              --query 'tasks[0].[taskArn,lastStatus,healthStatus,containers[0].image]' \
              --output table
          else
            echo "⚠️ No running tasks found"
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ steps.check-task-def.outputs.exists }}" == "false" ]; then
            echo "⚠️ Skipped deployment for ${{ steps.service.outputs.name }}"
            echo "📋 Image built and pushed to ECR: ${{ steps.build-image.outputs.image }}"
            echo "🏗️ Deploy infrastructure first: cd terraform/environments/prd && terraform apply"
            exit 0
          elif [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Deployment successful for ${{ steps.service.outputs.name }}"
          else
            echo "❌ Deployment failed for ${{ steps.service.outputs.name }}"
            exit 1
          fi
